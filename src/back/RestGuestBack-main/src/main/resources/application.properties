server.port=8081

# Azure SQL - Configuración SSL CORRECTA (usando variables de entorno)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://restguestserver.database.windows.net:1433;database=RestGuestDB;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:adminrestguest}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA - Crear tablas automáticamente O validar solo las existentes
spring.jpa.hibernate.ddl-auto=update
# O usa: spring.jpa.hibernate.ddl-auto=validate

# Mostrar SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT
jwt.secret=${JWT_SECRET:SDfhT3vLSdVNLHf89XU5Pf78vQmKXREkYvZbAwmcRRA}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS (opcional, si lo usas)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Actuator (para health checks)
management.endpoints.web.exposure.include=health,info,metrics