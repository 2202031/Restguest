name: Backend CI/CD con Secrets

on:
  push:
    branches: [ develop, main ]
    paths:
      - 'src/back/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/back/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Compilar y ejecutar pruebas unitarias
        run: |
          cd src/back/RestGuestBack-main
          mvn clean test
      - name: Empaquetar JAR
        run: |
          cd src/back/RestGuestBack-main
          mvn package -DskipTests
      - name: Subir JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: restguest-backend-jar
          path: src/back/RestGuestBack-main/target/*.jar

  despliegue:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Descargar JAR
        uses: actions/download-artifact@v4
        with:
          name: restguest-backend-jar
          path: ./backend-artifact
      



      - name: Verificar que los secrets existen (no se muestran)
        env:
          AZURE_SQL_URL: ${{ secrets.AZURE_SQL_URL }}
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          echo "✅ Secrets configurados correctamente"

      # 🔥 NUEVO: Prueba real de conexión a Azure SQL
      - name: Probar conexión a Azure SQL
        run: |
          # Instalar sqlcmd
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/20.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo apt-get install -y mssql-tools18 unixodbc-dev
          echo 'export PATH="$PATH:/opt/mssql-tools18/bin"' >> ~/.bashrc
          source ~/.bashrc
          # Ejecutar consulta de prueba (reemplaza con el nombre real de tu BD)
          sqlcmd -S restguestserver.database.windows.net -d RestGuestDB -U adminrestguest -P "${{ secrets.AZURE_SQL_PASSWORD }}" -Q "SELECT COUNT(*) FROM personal;"
        env:
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}

      - name: 🚀 Disparar despliegue en Render
        run: |
          echo "🚀 Disparando despliegue en Render..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}    