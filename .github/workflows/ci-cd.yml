name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run backend tests
        run: |
          cd src/back/RestGuestBack-main
          mvn test

      - name: Start backend
        run: |
          cd src/back/RestGuestBack-main
          nohup mvn spring-boot:run > app.log 2>&1 &
          sleep 35
          echo "===== BACKEND LOG ====="
          cat app.log

      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/api/auth/test || true)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Smoke test OK"
          else
            echo "Smoke test failed"
            exit 1
          fi